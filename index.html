<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JEE Mains 2026 Special Questions</title>

        <link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
        <link rel="manifest" href="icon/site.webmanifest">
        
        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
        <link rel="stylesheet" href="main.css">
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [
                        ["$", "$"],
                        ["\\(", "\\)"],
                    ],
                    displayMath: [
                        ["$$", "$$"],
                        ["\\[", "\\]"],
                    ],
                    processEscapes: true,
                },
                svg: { fontCache: "global" },
            };
        </script>
    </head>
    <body class="sidebar-open">
        <!-- New Top Navigation Bar -->
        <nav class="top-nav">
            <div class="nav-left">
                <button class="menu-toggle" id="menu-toggle" aria-label="Toggle chapter menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="nav-title">JEE Mains 2026</div>
            </div>
            <div class="nav-right">
                <button class="profile-btn" id="profile-btn" aria-label="Profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
                <div class="profile-popup" id="profile-popup">
                    <p><strong>Disclaimer</strong></p>
                    <p style="margin-top:8px;">This website was made for educational purposes and does not claim any official affiliation.</p>
                </div>
            </div>
        </nav>
        
        <div class="layout">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title-container">
                        <span class="sidebar-title-full">Questions Pool</span>
                        <span class="sidebar-header-badge">2026</span>
                    </div>
                </div>
                <div id="nav-list" class="subject-list"></div>
            </div>
            <div class="main">
                <h2 id="chap-title">Select a Chapter</h2>
                <div id="content-area"></div>
            </div>
        </div>
        <script src="main.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const body = document.body;
                const menuToggle = document.getElementById("menu-toggle");
                const sidebar = document.getElementById("sidebar");
                const profileBtn = document.getElementById("profile-btn");
                const profilePopup = document.getElementById("profile-popup");

                function openSidebar() {
                    body.classList.add("sidebar-open");
                }

                function closeSidebar() {
                    body.classList.remove("sidebar-open");
                }

                menuToggle.addEventListener("click", function (e) {
                    e.stopPropagation(); // Prevent document click from immediately closing
                    if (body.classList.contains("sidebar-open")) {
                        closeSidebar();
                    } else {
                        openSidebar();
                    }
                });

                profileBtn.addEventListener("click", function(e) {
                    e.stopPropagation(); // Prevent document click from immediately closing
                    profilePopup.classList.toggle("show");
                });

                // Close sidebar or popup when clicking outside
                document.addEventListener("click", function (e) {
                    // close popup
                    if (!profilePopup.contains(e.target) && !profileBtn.contains(e.target)) {
                        profilePopup.classList.remove("show");
                    }
                    
                    // close sidebar on mobile
                    if (window.innerWidth <= 768 && body.classList.contains("sidebar-open")) {
                        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                            closeSidebar();
                        }
                    }
                });
            });
        </script>
    </body>
</html>
